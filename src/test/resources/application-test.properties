# Test configuration using H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Primary Sync DataSource for testing
datasource.primary.driver-class-name=org.h2.Driver
datasource.primary.url=jdbc:h2:mem:primarydb;DB_CLOSE_DELAY=-1;MODE=MySQL
datasource.primary.username=sa
datasource.primary.password=

# Secondary Sync DataSource for testing
datasource.secondary.driver-class-name=org.h2.Driver
datasource.secondary.url=jdbc:h2:mem:secondarydb;DB_CLOSE_DELAY=-1;MODE=MySQL
datasource.secondary.username=sa
datasource.secondary.password=

# Disable async for easier testing
spring.task.execution.pool.core-size=1
spring.task.execution.pool.max-size=1

# Reduce logging noise in tests
logging.level.com.example.datasynchronizationtool=WARN
logging.level.org.springframework=WARN
