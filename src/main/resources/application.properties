spring.application.name=DataSynchronizationTool

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Primary DataSource Configuration (used for sync configuration storage)
# Use environment variables for sensitive data
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=${DB_CONFIG_URL:jdbc:mysql://localhost:3306/sync_config_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_CONFIG_USERNAME:root}
spring.datasource.password=${DB_CONFIG_PASSWORD:}

# Primary Sync DataSource (source/target for synchronization)
datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver
datasource.primary.url=${DB_PRIMARY_URL:jdbc:mysql://localhost:3306/primary_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
datasource.primary.username=${DB_PRIMARY_USERNAME:root}
datasource.primary.password=${DB_PRIMARY_PASSWORD:}

# Secondary Sync DataSource (source/target for synchronization)
datasource.secondary.driver-class-name=com.mysql.cj.jdbc.Driver
datasource.secondary.url=${DB_SECONDARY_URL:jdbc:mysql://localhost:3306/secondary_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
datasource.secondary.username=${DB_SECONDARY_USERNAME:root}
datasource.secondary.password=${DB_SECONDARY_PASSWORD:}

# Async Task Executor Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=sync-async-

# Scheduler Configuration
spring.task.scheduling.pool.size=10
spring.task.scheduling.thread-name-prefix=sync-scheduler-

# Logging Configuration
logging.level.com.example.datasynchronizationtool=INFO
logging.level.com.example.datasynchronizationtool.service.sync=DEBUG
logging.level.org.springframework.jdbc=WARN

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.health.datasource.enabled=true
management.metrics.tags.application=${spring.application.name}

# Custom health check timeouts
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
