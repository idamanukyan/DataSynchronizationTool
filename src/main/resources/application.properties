spring.application.name=DataSynchronizationTool

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Primary DataSource Configuration (used for sync configuration storage)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/sync_config_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Primary Sync DataSource (source/target for synchronization)
datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver
datasource.primary.url=jdbc:mysql://localhost:3306/primary_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
datasource.primary.username=root
datasource.primary.password=

# Secondary Sync DataSource (source/target for synchronization)
datasource.secondary.driver-class-name=com.mysql.cj.jdbc.Driver
datasource.secondary.url=jdbc:mysql://localhost:3306/secondary_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
datasource.secondary.username=root
datasource.secondary.password=

# Async Task Executor Configuration
spring.task.execution.pool.core-size=5
spring.task.execution.pool.max-size=10
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=sync-async-

# Scheduler Configuration
spring.task.scheduling.pool.size=10
spring.task.scheduling.thread-name-prefix=sync-scheduler-

# Logging Configuration
logging.level.com.example.datasynchronizationtool=INFO
logging.level.com.example.datasynchronizationtool.service.sync=DEBUG
logging.level.org.springframework.jdbc=WARN
